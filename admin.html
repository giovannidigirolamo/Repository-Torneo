<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Torneo Trisport</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="admin-login" class="container">
        <h1>Accesso Admin</h1>
        <input type="password" id="admin-pass" placeholder="Password">
        <button onclick="checkAdminLogin()">Entra</button>
    </div>

    <div id="admin-dashboard" class="container hidden">
        <div class="tab-menu">
            <button onclick="showTab('tab-tornei')">Tornei</button>
            <button onclick="showTab('tab-gironi')">Gironi</button>
            <button onclick="showTab('tab-squadre')">Squadre</button>
            <button onclick="showTab('tab-calendario')">Calendario</button>
            <button onclick="showTab('tab-risultati')">Risultati</button>
            <button onclick="showTab('tab-arbitri')">Arbitri</button>
        </div>

        <div id="tab-tornei" class="admin-section">
            <h3>Nuovo Torneo</h3>
            <input type="text" id="new-tournament-name" placeholder="Nome Torneo">
            <button onclick="aggiungiTorneo()">Crea Torneo</button>
            <div id="lista-tornei"></div>
        </div>

        <div id="tab-gironi" class="admin-section hidden">
            <h3>Nuovo Girone</h3>
            <select id="new-group-tournament" class="select-tornei-dinamica"></select>
            <input type="text" id="new-group-name" placeholder="Nome Girone">
            <button onclick="aggiungiGirone()">Crea Girone</button>
            <div id="lista-gironi"></div>
        </div>

        <div id="tab-squadre" class="admin-section hidden">
            <h3>Nuova Squadra</h3>
            <input type="text" id="new-team-name" placeholder="Nome Squadra">
            <select id="new-team-torneo" class="select-tornei-dinamica" onchange="caricaGironiPerSquadra()"></select>
            <select id="new-team-group"><option>Scegli prima il torneo</option></select>
            <button onclick="aggiungiSquadra()">Salva Squadra</button>
            <div id="teams-list-pro"></div>
        </div>
        
        <!-- Altre sezioni (Calendario, Arbitri) seguono lo stesso schema -->
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
